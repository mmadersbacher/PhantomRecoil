name: Build Windows Executable

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      APP_VERSION: 1.0.31

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install pyinstaller pywebview pywin32 pillow

    - name: Run tests
      run: |
        python -m unittest discover -s tests -p "test_*.py"

    - name: Build executable
      run: |
        pyinstaller --noconfirm --onefile --windowed --noconsole --name "Phantom_Recoil_Standalone" --icon="icon.ico" --add-data "web;web" --add-data "icon.ico;." "ui_app.py"

    - name: Install Inno Setup
      run: |
        choco install innosetup --no-progress -y

    - name: Build installer
      shell: pwsh
      run: |
        & "C:/Program Files (x86)/Inno Setup 6/ISCC.exe" "installer.iss" "/DAppVersion=$env:APP_VERSION" "/DSignedUninstallerMode=no"

    - name: Generate SHA256
      shell: pwsh
      run: |
        $exeHash = (Get-FileHash "dist/Phantom_Recoil_Standalone.exe" -Algorithm SHA256).Hash
        $setupPath = "dist/PhantomRecoilSetup_v$env:APP_VERSION.exe"
        $setupHash = (Get-FileHash $setupPath -Algorithm SHA256).Hash
        @(
          "Phantom_Recoil_Standalone.exe $exeHash"
          "PhantomRecoilSetup_v$env:APP_VERSION.exe $setupHash"
        ) | Out-File -FilePath SHA256SUMS.txt -Encoding ascii

    - name: Generate latest.json manifest
      run: |
        python generate_latest_manifest.py --version "v${{ env.APP_VERSION }}" --repo "mmadersbacher/PhantomRecoil" --portable "dist/Phantom_Recoil_Standalone.exe" --installer "dist/PhantomRecoilSetup_v${{ env.APP_VERSION }}.exe" --checksums "SHA256SUMS.txt" --output "latest.json"

    - name: Create GitHub Release and upload assets
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: pwsh
      run: |
        $version = "v$env:APP_VERSION"
        $setupFile = "dist/PhantomRecoilSetup_v$env:APP_VERSION.exe"

        $result = gh release create $version --title "Phantom Recoil $version" --notes "ADS scope sensitivity (1x / 2.5x) toggle in sidebar with correct DPI and sensitivity scaling. Settings persisted and included in export/import." 2>&1
        if ($LASTEXITCODE -ne 0) {
          Write-Host "Note: $result"
        }

        gh release upload $version "dist/Phantom_Recoil_Standalone.exe" --clobber
        gh release upload $version $setupFile --clobber
        gh release upload $version "SHA256SUMS.txt" --clobber
        gh release upload $version "latest.json" --clobber

    - name: Upload executable artifact
      uses: actions/upload-artifact@v4
      with:
        name: Phantom_Recoil_Standalone
        path: dist/Phantom_Recoil_Standalone.exe

    - name: Upload installer artifact
      uses: actions/upload-artifact@v4
      with:
        name: PhantomRecoilSetup
        path: dist/PhantomRecoilSetup_v${{ env.APP_VERSION }}.exe

    - name: Upload checksum artifact
      uses: actions/upload-artifact@v4
      with:
        name: SHA256SUMS
        path: SHA256SUMS.txt

    - name: Upload latest manifest artifact
      uses: actions/upload-artifact@v4
      with:
        name: latest-manifest
        path: latest.json
